<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thank You | Site Sprout</title>
    <style>
      :root {
        --ink: #2f2a21;
        --soft-ink: #5f5748;
        --olive: #78864d;
        --olive-dark: #58643a;
        --cream: #fff9ee;
        --paper: #fffdf7;
        --line: #3f3428;
        --sage: #dce2c8;
        --shadow: 0 24px 70px rgba(59, 48, 37, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow-x: hidden;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 44%, rgba(255, 255, 255, 0.58), transparent 38%),
          radial-gradient(circle at 15% 75%, rgba(120, 134, 77, 0.14), transparent 22%),
          radial-gradient(circle at 86% 28%, rgba(120, 134, 77, 0.11), transparent 24%),
          linear-gradient(135deg, #fff9ee, #f3e6cf);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        width: 210px;
        height: 310px;
        background: url("assets/site-sprout-icon.png") center / contain no-repeat;
        opacity: 0.08;
        pointer-events: none;
      }

      body::before {
        left: 9vw;
        bottom: 10vh;
        transform: rotate(-18deg);
      }

      body::after {
        right: 9vw;
        top: 25vh;
        transform: rotate(15deg);
      }

      main {
        position: relative;
        width: min(100% - 36px, 780px);
        margin: 72px auto;
      }

      .thank-card {
        position: relative;
        min-height: 520px;
        padding: 106px 56px 50px;
        text-align: center;
        background: rgba(255, 253, 247, 0.62);
        border: 4px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(6px);
      }

      .browser-dots {
        position: absolute;
        top: 30px;
        left: 34px;
        display: flex;
        gap: 13px;
      }

      .browser-dots span {
        width: 14px;
        height: 14px;
        background: var(--olive);
        border-radius: 50%;
        box-shadow: inset 0 0 0 1px rgba(47, 42, 33, 0.16);
      }

      .sprout-badge {
        position: absolute;
        top: -75px;
        left: 50%;
        width: 150px;
        height: 150px;
        display: grid;
        place-items: center;
        transform: translateX(-50%);
        background: var(--paper);
        border: 4px solid var(--line);
        border-radius: 50%;
        box-shadow: 0 16px 38px rgba(59, 48, 37, 0.12);
      }

      .sprout-badge::before,
      .sprout-badge::after {
        content: "";
        position: absolute;
        top: -42px;
        width: 3px;
        height: 25px;
        background: var(--olive-dark);
        border-radius: 999px;
      }

      .sprout-badge::before {
        left: 43px;
        transform: rotate(-34deg);
      }

      .sprout-badge::after {
        right: 43px;
        transform: rotate(34deg);
      }

      .sprout-badge img {
        width: 86px;
        height: 86px;
        object-fit: contain;
      }

      h1 {
        max-width: 590px;
        margin: 36px auto 18px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3rem, 8vw, 4.85rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .divider {
        width: min(260px, 64%);
        height: 32px;
        margin: 24px auto 24px;
        display: grid;
        grid-template-columns: 1fr 42px 1fr;
        align-items: center;
        gap: 14px;
      }

      .divider::before,
      .divider::after {
        content: "";
        height: 3px;
        background: var(--olive-dark);
        border-radius: 999px;
      }

      .divider img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      p {
        max-width: 510px;
        margin: 0 auto 34px;
        color: var(--ink);
        font-size: clamp(1.1rem, 2.3vw, 1.32rem);
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        color: var(--olive-dark);
        font-size: 1.18rem;
        font-weight: 850;
        text-decoration-thickness: 2px;
        text-underline-offset: 5px;
      }

      a:hover {
        color: var(--ink);
      }

      .envelope {
        position: absolute;
        right: 62px;
        bottom: 42px;
        width: 118px;
        height: 82px;
        border: 4px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
      }

      .envelope::before,
      .envelope::after {
        content: "";
        position: absolute;
        left: 11px;
        top: 15px;
        width: 69px;
        height: 4px;
        background: var(--line);
        transform-origin: left center;
      }

      .envelope::before {
        transform: rotate(35deg);
      }

      .envelope::after {
        left: auto;
        right: 11px;
        transform-origin: right center;
        transform: rotate(-35deg);
      }

      .check {
        position: absolute;
        right: -18px;
        top: -22px;
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        color: white;
        background: var(--olive);
        border: 3px solid rgba(255, 249, 238, 0.9);
        border-radius: 50%;
        font-size: 2rem;
        font-weight: 900;
      }

      .mini-sprout {
        position: absolute;
        left: -22px;
        bottom: -8px;
        width: 44px;
        height: 44px;
        background: url("assets/site-sprout-icon.png") center / contain no-repeat;
      }

      @media (max-width: 680px) {
        body {
          align-items: start;
        }

        main {
          margin: 86px auto 28px;
        }

        .thank-card {
          min-height: 0;
          padding: 84px 24px 142px;
          border-width: 3px;
        }

        .browser-dots {
          top: 26px;
          left: 22px;
        }

        .sprout-badge {
          top: -60px;
          width: 120px;
          height: 120px;
        }

        .sprout-badge img {
          width: 70px;
          height: 70px;
        }

        h1 {
          margin-top: 26px;
          font-size: clamp(2.45rem, 13vw, 3.7rem);
        }

        .envelope {
          right: 28px;
          bottom: 28px;
          width: 96px;
          height: 68px;
        }
      }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LKYJQQ8VSJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-LKYJQQ8VSJ');
    </script>
  </head>
  <body>
    <main>
      <section class="thank-card" aria-labelledby="thank-you-title">
        <div class="browser-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="sprout-badge" aria-hidden="true">
          <img src="assets/site-sprout-icon.png" alt="">
        </div>
        <h1 id="thank-you-title">Thanks - we got your request.</h1>
        <div class="divider" aria-hidden="true">
          <img src="assets/site-sprout-icon.png" alt="">
        </div>
        <p>Site Sprout will review your website check request and follow up soon.</p>
        <a href="/">Back to homepage</a>
        <div class="envelope" aria-hidden="true">
          <span class="check">✓</span>
          <span class="mini-sprout"></span>
        </div>
      </section>
    </main>
  </body>
</html>
